<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AWS Architecture - Traffic Flow</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #232F3E;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Amazon Ember', 'Segoe UI', sans-serif;
      color: #FFFFFF;
    }
    h1 {
      color: #FF9900;
      font-size: 1.5rem;
      margin-bottom: 16px;
      text-align: center;
    }
    .diagram-container {
      position: relative;
      width: 90vw;
      max-width: 1600px;
      aspect-ratio: 16 / 9;
      border: 1px solid #3d4f5f;
      border-radius: 8px;
      overflow: hidden;
    }
    /* Use this class if using a PNG background */
    .diagram-container img.background {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    /* SVG overlay fills the container */
    .diagram-container svg.overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    /* Interactive legend */
    .legend {
      position: absolute;
      bottom: 16px;
      right: 16px;
      background: rgba(35, 47, 62, 0.92);
      border: 1px solid #FF9900;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      z-index: 10;
    }
    .legend label {
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 4px 0;
      cursor: pointer;
      user-select: none;
    }
    .legend input[type="checkbox"] {
      accent-color: #FF9900;
    }
  </style>
</head>
<body>

  <h1>Architecture — Traffic Flow Animation</h1>

  <div class="diagram-container">

    <!-- OPTION A: PNG background from Draw.io export -->
    <!-- <img class="background" src="background.png" alt="Architecture diagram"> -->

    <!-- OPTION B: Inline SVG (self-contained) -->
    <svg class="overlay" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">

      <!-- ==================== STATIC ELEMENTS ==================== -->

      <!-- AWS Cloud group box -->
      <rect x="350" y="30" width="1230" height="810" rx="0"
            fill="none" stroke="#232F3E" stroke-width="3" />
      <text x="370" y="60" fill="#232F3E" font-size="16" font-weight="bold"
            font-family="Amazon Ember, sans-serif">AWS Cloud</text>

      <!-- VPC group box -->
      <rect x="400" y="100" width="700" height="500" rx="0"
            fill="none" stroke="#879196" stroke-width="2" />
      <text x="420" y="130" fill="#879196" font-size="13" font-weight="bold"
            font-family="Amazon Ember, sans-serif">VPC (10.0.0.0/16)</text>

      <!-- Service boxes -->
      <g id="svc-alb" transform="translate(500, 250)">
        <rect x="-55" y="-25" width="110" height="50" rx="8"
              fill="#5A30B5" stroke="#945DF2" stroke-width="2" />
        <text x="0" y="5" text-anchor="middle" fill="#FFF" font-size="13"
              font-family="Amazon Ember, sans-serif">ALB</text>
      </g>

      <g id="svc-lambda" transform="translate(750, 250)">
        <rect x="-55" y="-25" width="110" height="50" rx="8"
              fill="#D05C17" stroke="#F78E04" stroke-width="2" />
        <text x="0" y="5" text-anchor="middle" fill="#FFF" font-size="13"
              font-family="Amazon Ember, sans-serif">Lambda</text>
      </g>

      <g id="svc-dynamo" transform="translate(1000, 250)">
        <rect x="-55" y="-25" width="110" height="50" rx="8"
              fill="#3334B9" stroke="#4D72F3" stroke-width="2" />
        <text x="0" y="5" text-anchor="middle" fill="#FFF" font-size="13"
              font-family="Amazon Ember, sans-serif">DynamoDB</text>
      </g>

      <!-- User icon (external) -->
      <g id="user" transform="translate(150, 250)">
        <circle r="25" fill="none" stroke="#AAAAAA" stroke-width="2" />
        <text x="0" y="5" text-anchor="middle" fill="#AAAAAA" font-size="12"
              font-family="Amazon Ember, sans-serif">User</text>
        <text x="0" y="45" text-anchor="middle" fill="#888" font-size="10"
              font-family="Amazon Ember, sans-serif">Browser</text>
      </g>

      <!-- ==================== MOTION PATHS ==================== -->

      <!-- Inbound: User → ALB -->
      <path id="path-inbound" d="M 175,250 L 445,250" fill="none" stroke="none" />

      <!-- Internal: ALB → Lambda -->
      <path id="path-alb-lambda" d="M 555,250 L 695,250" fill="none" stroke="none" />

      <!-- Internal: Lambda → DynamoDB -->
      <path id="path-lambda-dynamo" d="M 805,250 L 945,250" fill="none" stroke="none" />

      <!-- ==================== ANIMATIONS ==================== -->

      <!-- Inbound traffic: User → ALB (Blue) -->
      <circle r="5" fill="#147EBA" opacity="0.9" data-group="inbound">
        <animateMotion dur="2s" begin="0s" repeatCount="indefinite">
          <mpath href="#path-inbound" />
        </animateMotion>
      </circle>
      <circle r="5" fill="#147EBA" opacity="0.9" data-group="inbound">
        <animateMotion dur="2s" begin="0.66s" repeatCount="indefinite">
          <mpath href="#path-inbound" />
        </animateMotion>
      </circle>
      <circle r="5" fill="#147EBA" opacity="0.9" data-group="inbound">
        <animateMotion dur="2s" begin="1.33s" repeatCount="indefinite">
          <mpath href="#path-inbound" />
        </animateMotion>
      </circle>

      <!-- Internal traffic: ALB → Lambda (Orange) -->
      <circle r="4" fill="#FF9900" opacity="0.9" data-group="internal">
        <animateMotion dur="1.5s" begin="0s" repeatCount="indefinite">
          <mpath href="#path-alb-lambda" />
        </animateMotion>
      </circle>
      <circle r="4" fill="#FF9900" opacity="0.9" data-group="internal">
        <animateMotion dur="1.5s" begin="0.75s" repeatCount="indefinite">
          <mpath href="#path-alb-lambda" />
        </animateMotion>
      </circle>

      <!-- Internal traffic: Lambda → DynamoDB (Orange) -->
      <circle r="4" fill="#FF9900" opacity="0.9" data-group="internal">
        <animateMotion dur="1.5s" begin="0.3s" repeatCount="indefinite">
          <mpath href="#path-lambda-dynamo" />
        </animateMotion>
      </circle>
      <circle r="4" fill="#FF9900" opacity="0.9" data-group="internal">
        <animateMotion dur="1.5s" begin="1.05s" repeatCount="indefinite">
          <mpath href="#path-lambda-dynamo" />
        </animateMotion>
      </circle>

      <!-- Pulsing glow on Lambda (active processing) -->
      <circle cx="750" cy="250" r="30" fill="none" stroke="#F78E04" stroke-width="2"
              data-group="internal">
        <animate attributeName="r" values="30;40;30" dur="2s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0.6;0.15;0.6" dur="2s" repeatCount="indefinite" />
      </circle>

    </svg>

    <!-- Interactive Legend -->
    <div class="legend">
      <label>
        <input type="checkbox" checked onchange="toggleGroup('inbound')">
        <span style="color:#147EBA">&#9679; Inbound Traffic</span>
      </label>
      <label>
        <input type="checkbox" checked onchange="toggleGroup('internal')">
        <span style="color:#FF9900">&#9679; AWS Internal</span>
      </label>
    </div>

  </div>

  <script>
    function toggleGroup(group) {
      document.querySelectorAll('[data-group="' + group + '"]').forEach(function(el) {
        el.style.display = el.style.display === 'none' ? '' : 'none';
      });
    }
  </script>

</body>
</html>
