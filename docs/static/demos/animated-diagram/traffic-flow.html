<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VPC Traffic Flow Animation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #232F3E;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Amazon Ember', 'Segoe UI', system-ui, sans-serif;
    }
    .container {
      width: 100%;
      max-width: 1200px;
      padding: 20px;
    }
    h1 {
      color: #fff;
      font-size: 1.4rem;
      font-weight: 400;
      text-align: center;
      margin-bottom: 16px;
    }
    h1 span { color: #FF9900; font-weight: 600; }
    .legend {
      display: flex;
      gap: 24px;
      padding: 12px 24px;
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      margin-top: 16px;
      justify-content: center;
    }
    .legend label {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
      user-select: none;
    }
    .legend input[type="checkbox"] {
      accent-color: #FF9900;
      width: 16px;
      height: 16px;
    }
    .info {
      text-align: center;
      color: rgba(255,255,255,0.4);
      font-size: 12px;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>VPC <span>Traffic Flow</span> Animation</h1>
    <svg viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg">
      <!-- Background -->
      <rect width="1200" height="420" fill="#232F3E" rx="12"/>

      <!-- VPC boundary -->
      <rect x="160" y="30" width="880" height="340" rx="12" fill="none" stroke="#248814" stroke-width="2" stroke-dasharray="8,4" opacity="0.5"/>
      <text x="180" y="55" fill="#248814" font-size="13" font-weight="600" opacity="0.7">VPC (10.0.0.0/16)</text>

      <!-- Service boxes -->
      <g id="services">
        <!-- User (outside VPC) -->
        <rect x="30" y="160" width="100" height="70" rx="12" fill="#545B64"/>
        <text x="80" y="192" fill="#fff" text-anchor="middle" font-size="13" font-weight="600">Users</text>
        <text x="80" y="210" fill="rgba(255,255,255,0.5)" text-anchor="middle" font-size="10">Internet</text>

        <!-- CloudFront -->
        <rect x="200" y="160" width="120" height="70" rx="12" fill="#5A30B5"/>
        <text x="260" y="192" fill="#fff" text-anchor="middle" font-size="13" font-weight="600">CloudFront</text>
        <text x="260" y="210" fill="rgba(255,255,255,0.5)" text-anchor="middle" font-size="10">CDN + WAF</text>

        <!-- ALB -->
        <rect x="420" y="160" width="120" height="70" rx="12" fill="#5A30B5"/>
        <text x="480" y="192" fill="#fff" text-anchor="middle" font-size="13" font-weight="600">ALB</text>
        <text x="480" y="210" fill="rgba(255,255,255,0.5)" text-anchor="middle" font-size="10">Load Balancer</text>

        <!-- ECS -->
        <rect x="640" y="160" width="120" height="70" rx="12" fill="#D05C17"/>
        <text x="700" y="192" fill="#fff" text-anchor="middle" font-size="13" font-weight="600">ECS</text>
        <text x="700" y="210" fill="rgba(255,255,255,0.5)" text-anchor="middle" font-size="10">Fargate Tasks</text>

        <!-- Aurora -->
        <rect x="860" y="160" width="120" height="70" rx="12" fill="#3334B9"/>
        <text x="920" y="192" fill="#fff" text-anchor="middle" font-size="13" font-weight="600">Aurora</text>
        <text x="920" y="210" fill="rgba(255,255,255,0.5)" text-anchor="middle" font-size="10">MySQL 8.0</text>

        <!-- ElastiCache (branch path) -->
        <rect x="640" y="60" width="120" height="60" rx="12" fill="#3334B9"/>
        <text x="700" y="90" fill="#fff" text-anchor="middle" font-size="12" font-weight="600">ElastiCache</text>
        <text x="700" y="106" fill="rgba(255,255,255,0.5)" text-anchor="middle" font-size="10">Redis</text>

        <!-- S3 (branch path) -->
        <rect x="640" y="280" width="120" height="60" rx="12" fill="#277116"/>
        <text x="700" y="310" fill="#fff" text-anchor="middle" font-size="12" font-weight="600">S3</text>
        <text x="700" y="326" fill="rgba(255,255,255,0.5)" text-anchor="middle" font-size="10">Static Assets</text>

        <!-- CloudWatch -->
        <rect x="1060" y="160" width="110" height="70" rx="12" fill="#BC1356" opacity="0.8"/>
        <text x="1115" y="192" fill="#fff" text-anchor="middle" font-size="12" font-weight="600">CloudWatch</text>
        <text x="1115" y="210" fill="rgba(255,255,255,0.5)" text-anchor="middle" font-size="10">Monitoring</text>
      </g>

      <!-- Connection lines -->
      <g opacity="0.3">
        <line x1="130" y1="195" x2="200" y2="195" stroke="#147EBA" stroke-width="2"/>
        <line x1="320" y1="195" x2="420" y2="195" stroke="#147EBA" stroke-width="2"/>
        <line x1="540" y1="195" x2="640" y2="195" stroke="#FF9900" stroke-width="2"/>
        <line x1="760" y1="195" x2="860" y2="195" stroke="#FF9900" stroke-width="2"/>
        <line x1="700" y1="160" x2="700" y2="120" stroke="#FF9900" stroke-width="2"/>
        <line x1="700" y1="230" x2="700" y2="280" stroke="#FF9900" stroke-width="2"/>
        <line x1="980" y1="195" x2="1060" y2="195" stroke="#1B660F" stroke-width="1.5" stroke-dasharray="4,3"/>
      </g>

      <!-- Traffic Paths -->
      <path id="p-in-1" d="M 130,195 L 200,195" fill="none" stroke="none"/>
      <path id="p-in-2" d="M 320,195 L 420,195" fill="none" stroke="none"/>
      <path id="p-int-1" d="M 540,195 L 640,195" fill="none" stroke="none"/>
      <path id="p-int-2" d="M 760,195 L 860,195" fill="none" stroke="none"/>
      <path id="p-int-3" d="M 700,160 L 700,120" fill="none" stroke="none"/>
      <path id="p-int-4" d="M 700,230 L 700,280" fill="none" stroke="none"/>
      <path id="p-mon" d="M 980,195 L 1060,195" fill="none" stroke="none"/>

      <!-- Inbound Traffic (Blue) -->
      <g data-group="inbound">
        <circle r="5" fill="#147EBA" opacity="0.9">
          <animateMotion dur="1.5s" begin="0s" repeatCount="indefinite"><mpath href="#p-in-1"/></animateMotion>
        </circle>
        <circle r="5" fill="#147EBA" opacity="0.9">
          <animateMotion dur="1.5s" begin="0.5s" repeatCount="indefinite"><mpath href="#p-in-1"/></animateMotion>
        </circle>
        <circle r="5" fill="#147EBA" opacity="0.9">
          <animateMotion dur="1.5s" begin="1s" repeatCount="indefinite"><mpath href="#p-in-1"/></animateMotion>
        </circle>
        <circle r="5" fill="#147EBA" opacity="0.9">
          <animateMotion dur="1.5s" begin="0.3s" repeatCount="indefinite"><mpath href="#p-in-2"/></animateMotion>
        </circle>
        <circle r="5" fill="#147EBA" opacity="0.9">
          <animateMotion dur="1.5s" begin="0.8s" repeatCount="indefinite"><mpath href="#p-in-2"/></animateMotion>
        </circle>
        <circle r="5" fill="#147EBA" opacity="0.9">
          <animateMotion dur="1.5s" begin="1.3s" repeatCount="indefinite"><mpath href="#p-in-2"/></animateMotion>
        </circle>
      </g>

      <!-- Internal Traffic (Orange) -->
      <g data-group="internal">
        <circle r="5" fill="#FF9900" opacity="0.9">
          <animateMotion dur="1.5s" begin="0s" repeatCount="indefinite"><mpath href="#p-int-1"/></animateMotion>
        </circle>
        <circle r="5" fill="#FF9900" opacity="0.9">
          <animateMotion dur="1.5s" begin="0.75s" repeatCount="indefinite"><mpath href="#p-int-1"/></animateMotion>
        </circle>
        <circle r="5" fill="#FF9900" opacity="0.9">
          <animateMotion dur="1.5s" begin="0.2s" repeatCount="indefinite"><mpath href="#p-int-2"/></animateMotion>
        </circle>
        <circle r="5" fill="#FF9900" opacity="0.9">
          <animateMotion dur="1.5s" begin="0.95s" repeatCount="indefinite"><mpath href="#p-int-2"/></animateMotion>
        </circle>
        <!-- Cache path -->
        <circle r="4" fill="#FF9900" opacity="0.7">
          <animateMotion dur="1.2s" begin="0.4s" repeatCount="indefinite"><mpath href="#p-int-3"/></animateMotion>
        </circle>
        <!-- S3 path -->
        <circle r="4" fill="#FF9900" opacity="0.7">
          <animateMotion dur="1.2s" begin="0.6s" repeatCount="indefinite"><mpath href="#p-int-4"/></animateMotion>
        </circle>
      </g>

      <!-- Monitoring Traffic (Green) -->
      <g data-group="monitoring">
        <circle r="3" fill="#1B660F" opacity="0.6">
          <animateMotion dur="2s" begin="0s" repeatCount="indefinite"><mpath href="#p-mon"/></animateMotion>
        </circle>
        <circle r="3" fill="#1B660F" opacity="0.6">
          <animateMotion dur="2s" begin="1s" repeatCount="indefinite"><mpath href="#p-mon"/></animateMotion>
        </circle>
      </g>

      <!-- Pulsing health indicators -->
      <circle cx="920" cy="195" r="15" fill="none" stroke="#1B660F" stroke-width="2">
        <animate attributeName="r" values="12;20;12" dur="2.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.6;0.15;0.6" dur="2.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="700" cy="90" r="12" fill="none" stroke="#1B660F" stroke-width="1.5">
        <animate attributeName="r" values="10;16;10" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.5;0.1;0.5" dur="3s" repeatCount="indefinite"/>
      </circle>

      <!-- Labels -->
      <text x="160" y="390" fill="rgba(255,255,255,0.25)" font-size="10">Inbound (Blue): User requests entering the VPC</text>
      <text x="160" y="405" fill="rgba(255,255,255,0.25)" font-size="10">Internal (Orange): Service-to-service communication</text>
    </svg>

    <!-- Interactive Legend -->
    <div class="legend">
      <label>
        <input type="checkbox" checked onchange="toggleGroup('inbound')">
        <span style="color:#147EBA">Inbound Traffic</span>
      </label>
      <label>
        <input type="checkbox" checked onchange="toggleGroup('internal')">
        <span style="color:#FF9900">Internal Traffic</span>
      </label>
      <label>
        <input type="checkbox" checked onchange="toggleGroup('monitoring')">
        <span style="color:#1B660F">Monitoring</span>
      </label>
    </div>
    <p class="info">Toggle checkboxes to show/hide traffic types</p>
  </div>

  <script>
    function toggleGroup(group) {
      document.querySelectorAll('[data-group="' + group + '"]').forEach(function(el) {
        el.style.display = el.style.display === 'none' ? '' : 'none';
      });
    }
  </script>
</body>
</html>
