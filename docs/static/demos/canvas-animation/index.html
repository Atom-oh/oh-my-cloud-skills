<script>
(function() {
  const canvas = document.getElementById('obs-service-map');
  if (!canvas) return;
  const container = canvas.parentElement;
  const BASE_W = 960, BASE_H = 400;

  function resizeCanvas() {
    const cw = container.clientWidth;
    const ch = container.clientHeight;
    if (cw <= 0 || ch <= 0) {
      setupCanvas('obs-service-map', BASE_W, BASE_H);
      return;
    }
    const dpr = window.devicePixelRatio || 1;
    const scale = cw / BASE_W;
    const scaledH = Math.min(Math.round(BASE_H * scale), ch);
    canvas.width = Math.round(cw * dpr);
    canvas.height = Math.round(scaledH * dpr);
    canvas.style.width = cw + 'px';
    canvas.style.height = scaledH + 'px';
    canvas.style.maxWidth = 'none';
    const c = canvas.getContext('2d');
    c.setTransform(1, 0, 0, 1, 0, 0);
    c.scale(scale * dpr, scale * dpr);
  }
  resizeCanvas();

  const ctx = canvas.getContext('2d');
  const width = BASE_W, height = BASE_H;
  let step = 0;
  const MAX_STEP = 7;

  function draw() {
    ctx.clearRect(0, 0, width, height);
    if (step >= 1) { drawIcon(ctx, './common/aws-icons/services/Arch_Amazon-CloudWatch_48.svg', 80, 120, 48); }
    if (step >= 1) { drawText(ctx, 'CloudWatch', 80, 158, {size: 9, color: Colors.textSec, align: 'center'}); }
    if (step >= 1) { drawBox(ctx, 55, 180, 100, 35, 'Collect', '#41B3FF'); }
    if (step >= 2) { drawIcon(ctx, './common/aws-icons/services/Arch_DevOpsGuru_48.svg', 272, 120, 48); }
    if (step >= 2) { drawText(ctx, 'DevOpsGuru', 272, 158, {size: 9, color: Colors.textSec, align: 'center'}); }
    if (step >= 2) { drawBox(ctx, 247, 180, 100, 35, 'Analyze', '#AD5CFF'); }
    if (step >= 3) { drawIcon(ctx, './common/aws-icons/services/Arch_Amazon-CloudWatch_48.svg', 464, 120, 48); }
    if (step >= 3) { drawText(ctx, 'CloudWatch', 464, 158, {size: 9, color: Colors.textSec, align: 'center'}); }
    if (step >= 3) { drawBox(ctx, 439, 180, 100, 35, 'Detect', '#FF5C85'); }
    if (step >= 4) { drawIcon(ctx, './common/aws-icons/services/Arch_AWS-X-Ray_48.svg', 656, 120, 48); }
    if (step >= 4) { drawText(ctx, 'X-Ray', 656, 158, {size: 9, color: Colors.textSec, align: 'center'}); }
    if (step >= 4) { drawBox(ctx, 631, 180, 100, 35, 'Trace', '#00E500'); }
    if (step >= 5) { drawIcon(ctx, './common/aws-icons/services/Arch_Amazon-EventBridge_48.svg', 848, 120, 48); }
    if (step >= 5) { drawText(ctx, 'EventBridge', 848, 158, {size: 9, color: Colors.textSec, align: 'center'}); }
    if (step >= 5) { drawBox(ctx, 823, 180, 100, 35, 'Act', '#FF693C'); }
    if (step >= 6) { drawArrow(ctx, 155, 197, 247, 197, Colors.accent, false); }
    if (step >= 6) { drawText(ctx, 'metrics', 201, 185, {size: 10, color: Colors.textSec, align: 'center'}); }
    if (step >= 6) { drawArrow(ctx, 347, 197, 439, 197, Colors.accent, false); }
    if (step >= 6) { drawText(ctx, 'insights', 393, 185, {size: 10, color: Colors.textSec, align: 'center'}); }
    if (step >= 7) { drawArrow(ctx, 539, 197, 631, 197, Colors.accent, false); }
    if (step >= 7) { drawText(ctx, 'traces', 585, 185, {size: 10, color: Colors.textSec, align: 'center'}); }
    if (step >= 7) { drawArrow(ctx, 731, 197, 823, 197, Colors.accent, false); }
    if (step >= 7) { drawText(ctx, 'events', 777, 185, {size: 10, color: Colors.textSec, align: 'center'}); }
  }

  draw();
  new ResizeObserver(() => { resizeCanvas(); draw(); }).observe(container);

  const slide = canvas.closest('.slide');
  if (slide) {
    slide.dataset.slideAction = 'canvas-step';
    slide.dataset.canvasMaxStep = String(MAX_STEP);
    slide.__canvasStep = function(dir) {
      if (dir === 'next' && step < MAX_STEP) step++;
      if (dir === 'prev' && step > 0) step--;
      draw();
      return step;
    };
  }
})();
</script>
