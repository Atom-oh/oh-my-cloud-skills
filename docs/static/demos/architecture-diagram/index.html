<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3-Tier VPC Architecture — Draw.io Style</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Amazon Ember', 'Segoe UI', system-ui, sans-serif;
    }
    .container {
      width: 100%;
      max-width: 1200px;
      padding: 20px;
    }
    svg text { font-family: 'Amazon Ember', 'Segoe UI', system-ui, sans-serif; }
  </style>
</head>
<body>
  <div class="container">
    <svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
      <!-- Background -->
      <rect width="1600" height="900" fill="none" rx="12"/>

      <!-- AWS Cloud -->
      <rect x="20" y="20" width="1560" height="860" rx="12" fill="none" stroke="#232F3E" stroke-width="2" stroke-dasharray="8,4"/>
      <rect x="30" y="8" width="120" height="24" fill="#1a1a2e" rx="4"/>
      <text x="42" y="24" fill="#232F3E" font-size="14" font-weight="600">AWS Cloud</text>

      <!-- Region -->
      <rect x="50" y="50" width="1500" height="820" rx="10" fill="none" stroke="#147EBA" stroke-width="2" stroke-dasharray="6,3"/>
      <rect x="60" y="38" width="160" height="24" fill="#1a1a2e" rx="4"/>
      <text x="72" y="54" fill="#147EBA" font-size="13" font-weight="600">ap-northeast-2</text>

      <!-- VPC -->
      <rect x="80" y="80" width="1440" height="770" rx="8" fill="none" stroke="#248814" stroke-width="2"/>
      <rect x="90" y="68" width="240" height="24" fill="#1a1a2e" rx="4"/>
      <text x="102" y="84" fill="#248814" font-size="13" font-weight="600">Production VPC (10.0.0.0/16)</text>

      <!-- Internet Gateway -->
      <rect x="700" y="92" width="56" height="56" rx="8" fill="#5A30B5" stroke="#fff" stroke-width="1"/>
      <text x="728" y="124" fill="#fff" font-size="10" text-anchor="middle" font-weight="600">IGW</text>
      <text x="728" y="164" fill="#945DF2" font-size="10" text-anchor="middle">Internet Gateway</text>

      <!-- ===== AZ-a (Left) ===== -->
      <!-- Public Subnet AZ-a -->
      <rect x="110" y="190" width="620" height="160" rx="8" fill="#F2F6E8" fill-opacity="0.08" stroke="#7AA116" stroke-width="1.5"/>
      <rect x="120" y="178" width="280" height="22" fill="#1a1a2e" rx="4"/>
      <text x="132" y="193" fill="#7AA116" font-size="12" font-weight="600">Public Subnet (10.0.1.0/24) — AZ-a</text>

      <!-- NAT Gateway -->
      <rect x="180" y="240" width="56" height="56" rx="8" fill="#5A30B5" stroke="#fff" stroke-width="1"/>
      <text x="208" y="272" fill="#fff" font-size="10" text-anchor="middle" font-weight="600">NAT</text>
      <text x="208" y="314" fill="#945DF2" font-size="10" text-anchor="middle">NAT Gateway</text>

      <!-- ALB -->
      <rect x="400" y="240" width="56" height="56" rx="8" fill="#5A30B5" stroke="#fff" stroke-width="1"/>
      <text x="428" y="272" fill="#fff" font-size="10" text-anchor="middle" font-weight="600">ALB</text>
      <text x="428" y="314" fill="#945DF2" font-size="10" text-anchor="middle">Application LB</text>

      <!-- Private Subnet AZ-a -->
      <rect x="110" y="380" width="620" height="200" rx="8" fill="#E6F6F7" fill-opacity="0.06" stroke="#147EBA" stroke-width="1.5"/>
      <rect x="120" y="368" width="290" height="22" fill="#1a1a2e" rx="4"/>
      <text x="132" y="383" fill="#147EBA" font-size="12" font-weight="600">Private Subnet (10.0.10.0/24) — AZ-a</text>

      <!-- Auto Scaling Group AZ-a -->
      <rect x="140" y="410" width="280" height="140" rx="6" fill="none" stroke="#D05C17" stroke-width="1.5" stroke-dasharray="5,3"/>
      <text x="280" y="430" fill="#D05C17" font-size="10" text-anchor="middle" font-style="italic">Auto Scaling Group</text>

      <!-- EC2 Instances AZ-a -->
      <rect x="170" y="445" width="48" height="48" rx="8" fill="#D05C17" stroke="#fff" stroke-width="1"/>
      <text x="194" y="473" fill="#fff" font-size="9" text-anchor="middle" font-weight="600">EC2</text>
      <text x="194" y="510" fill="#F78E04" font-size="9" text-anchor="middle">Web Server 1</text>

      <rect x="260" y="445" width="48" height="48" rx="8" fill="#D05C17" stroke="#fff" stroke-width="1"/>
      <text x="284" y="473" fill="#fff" font-size="9" text-anchor="middle" font-weight="600">EC2</text>
      <text x="284" y="510" fill="#F78E04" font-size="9" text-anchor="middle">Web Server 2</text>

      <rect x="350" y="445" width="48" height="48" rx="8" fill="#D05C17" stroke="#fff" stroke-width="1" opacity="0.5" stroke-dasharray="3,2"/>
      <text x="374" y="473" fill="#fff" font-size="9" text-anchor="middle" font-weight="600" opacity="0.5">EC2</text>
      <text x="374" y="510" fill="#F78E04" font-size="9" text-anchor="middle" opacity="0.5">(scaling)</text>

      <!-- ===== AZ-c (Right) ===== -->
      <!-- Public Subnet AZ-c -->
      <rect x="780" y="190" width="620" height="160" rx="8" fill="#F2F6E8" fill-opacity="0.08" stroke="#7AA116" stroke-width="1.5"/>
      <rect x="790" y="178" width="280" height="22" fill="#1a1a2e" rx="4"/>
      <text x="802" y="193" fill="#7AA116" font-size="12" font-weight="600">Public Subnet (10.0.2.0/24) — AZ-c</text>

      <!-- NAT Gateway AZ-c -->
      <rect x="850" y="240" width="56" height="56" rx="8" fill="#5A30B5" stroke="#fff" stroke-width="1"/>
      <text x="878" y="272" fill="#fff" font-size="10" text-anchor="middle" font-weight="600">NAT</text>
      <text x="878" y="314" fill="#945DF2" font-size="10" text-anchor="middle">NAT Gateway</text>

      <!-- ALB target (same ALB spans AZs, shown as connection) -->
      <rect x="1070" y="240" width="56" height="56" rx="8" fill="#5A30B5" stroke="#fff" stroke-width="1"/>
      <text x="1098" y="272" fill="#fff" font-size="10" text-anchor="middle" font-weight="600">ALB</text>
      <text x="1098" y="314" fill="#945DF2" font-size="10" text-anchor="middle">Application LB</text>

      <!-- Cross-AZ ALB connection -->
      <line x1="456" y1="268" x2="1070" y2="268" stroke="#945DF2" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.5"/>
      <text x="750" y="260" fill="#945DF2" font-size="9" text-anchor="middle" opacity="0.7">Cross-AZ</text>

      <!-- Private Subnet AZ-c -->
      <rect x="780" y="380" width="620" height="200" rx="8" fill="#E6F6F7" fill-opacity="0.06" stroke="#147EBA" stroke-width="1.5"/>
      <rect x="790" y="368" width="290" height="22" fill="#1a1a2e" rx="4"/>
      <text x="802" y="383" fill="#147EBA" font-size="12" font-weight="600">Private Subnet (10.0.20.0/24) — AZ-c</text>

      <!-- Auto Scaling Group AZ-c -->
      <rect x="810" y="410" width="280" height="140" rx="6" fill="none" stroke="#D05C17" stroke-width="1.5" stroke-dasharray="5,3"/>
      <text x="950" y="430" fill="#D05C17" font-size="10" text-anchor="middle" font-style="italic">Auto Scaling Group</text>

      <!-- EC2 Instances AZ-c -->
      <rect x="840" y="445" width="48" height="48" rx="8" fill="#D05C17" stroke="#fff" stroke-width="1"/>
      <text x="864" y="473" fill="#fff" font-size="9" text-anchor="middle" font-weight="600">EC2</text>
      <text x="864" y="510" fill="#F78E04" font-size="9" text-anchor="middle">Web Server 3</text>

      <rect x="930" y="445" width="48" height="48" rx="8" fill="#D05C17" stroke="#fff" stroke-width="1"/>
      <text x="954" y="473" fill="#fff" font-size="9" text-anchor="middle" font-weight="600">EC2</text>
      <text x="954" y="510" fill="#F78E04" font-size="9" text-anchor="middle">Web Server 4</text>

      <rect x="1020" y="445" width="48" height="48" rx="8" fill="#D05C17" stroke="#fff" stroke-width="1" opacity="0.5" stroke-dasharray="3,2"/>
      <text x="1044" y="473" fill="#fff" font-size="9" text-anchor="middle" font-weight="600" opacity="0.5">EC2</text>
      <text x="1044" y="510" fill="#F78E04" font-size="9" text-anchor="middle" opacity="0.5">(scaling)</text>

      <!-- ===== DB Subnet (spans both AZs) ===== -->
      <rect x="110" y="620" width="1290" height="200" rx="8" fill="#E6E8F8" fill-opacity="0.06" stroke="#3334B9" stroke-width="1.5"/>
      <rect x="120" y="608" width="200" height="22" fill="#1a1a2e" rx="4"/>
      <text x="132" y="623" fill="#3334B9" font-size="12" font-weight="600">DB Subnet (10.0.100.0/24)</text>

      <!-- Aurora Primary -->
      <rect x="440" y="680" width="56" height="56" rx="8" fill="#3334B9" stroke="#fff" stroke-width="1"/>
      <text x="468" y="712" fill="#fff" font-size="10" text-anchor="middle" font-weight="600">RDS</text>
      <text x="468" y="755" fill="#4D72F3" font-size="10" text-anchor="middle">Aurora Primary</text>
      <text x="468" y="770" fill="#4D72F3" font-size="9" text-anchor="middle">(Writer)</text>

      <!-- Aurora Replica -->
      <rect x="1000" y="680" width="56" height="56" rx="8" fill="#3334B9" stroke="#fff" stroke-width="1"/>
      <text x="1028" y="712" fill="#fff" font-size="10" text-anchor="middle" font-weight="600">RDS</text>
      <text x="1028" y="755" fill="#4D72F3" font-size="10" text-anchor="middle">Aurora Replica</text>
      <text x="1028" y="770" fill="#4D72F3" font-size="9" text-anchor="middle">(Reader)</text>

      <!-- Aurora replication arrow -->
      <line x1="496" y1="708" x2="1000" y2="708" stroke="#4D72F3" stroke-width="2" stroke-dasharray="6,3"/>
      <polygon points="994,703 1004,708 994,713" fill="#4D72F3"/>
      <text x="748" y="698" fill="#4D72F3" font-size="9" text-anchor="middle">Async Replication</text>

      <!-- ===== Connection Arrows ===== -->
      <!-- IGW to ALB -->
      <line x1="728" y1="148" x2="428" y2="240" stroke="#545B64" stroke-width="2"/>
      <polygon points="425,234 432,244 420,244" fill="#545B64"/>
      <line x1="728" y1="148" x2="1098" y2="240" stroke="#545B64" stroke-width="2"/>
      <polygon points="1095,234 1102,244 1090,244" fill="#545B64"/>

      <!-- ALB to EC2 AZ-a -->
      <line x1="428" y1="296" x2="280" y2="445" stroke="#545B64" stroke-width="2"/>
      <polygon points="277,439 284,449 272,449" fill="#545B64"/>

      <!-- ALB to EC2 AZ-c -->
      <line x1="1098" y1="296" x2="950" y2="445" stroke="#545B64" stroke-width="2"/>
      <polygon points="947,439 954,449 942,449" fill="#545B64"/>

      <!-- EC2 to Aurora -->
      <line x1="260" y1="493" x2="440" y2="700" stroke="#545B64" stroke-width="1.5" stroke-dasharray="6,3"/>
      <polygon points="437,694 444,704 432,704" fill="#545B64"/>

      <line x1="930" y1="493" x2="1000" y2="700" stroke="#545B64" stroke-width="1.5" stroke-dasharray="6,3"/>
      <polygon points="997,694 1004,704 992,704" fill="#545B64"/>

      <!-- ===== Legend ===== -->
      <rect x="1180" y="630" width="230" height="170" rx="8" fill="rgba(255,255,255,0.03)" stroke="#545B64" stroke-width="1"/>
      <text x="1200" y="655" fill="#fff" font-size="12" font-weight="600">Legend</text>

      <rect x="1200" y="670" width="14" height="14" rx="2" fill="none" stroke="#7AA116" stroke-width="1.5"/>
      <text x="1222" y="682" fill="#aaa" font-size="10">Public Subnet</text>

      <rect x="1200" y="695" width="14" height="14" rx="2" fill="none" stroke="#147EBA" stroke-width="1.5"/>
      <text x="1222" y="707" fill="#aaa" font-size="10">Private Subnet</text>

      <rect x="1200" y="720" width="14" height="14" rx="2" fill="none" stroke="#3334B9" stroke-width="1.5"/>
      <text x="1222" y="732" fill="#aaa" font-size="10">DB Subnet</text>

      <line x1="1200" y1="752" x2="1214" y2="752" stroke="#545B64" stroke-width="2"/>
      <text x="1222" y="756" fill="#aaa" font-size="10">Sync Traffic</text>

      <line x1="1200" y1="775" x2="1214" y2="775" stroke="#545B64" stroke-width="1.5" stroke-dasharray="4,3"/>
      <text x="1222" y="779" fill="#aaa" font-size="10">Async / Data Flow</text>

      <!-- Title -->
      <text x="800" y="870" fill="rgba(255,255,255,0.3)" font-size="11" text-anchor="middle">3-Tier VPC Architecture — Generated by architecture-diagram-agent</text>
    </svg>
  </div>
</body>
</html>
